<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartbeat Validation Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc; /* Slate 50 */
    }
    
    .glass-panel {
      background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }

    #drop-zone.dragover {
      border-color: #3b82f6; /* Blue 500 */
      background: rgba(59, 130, 246, 0.1);
    }
    
    /* Scrollbar styling for the table */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans antialiased">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header & Upload -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
          CNAP Sync Validation
        </h1>
        <p class="text-slate-400 text-sm mt-1">Heartbeat validation & anomaly detection visualization</p>
      </div>
      
      <div id="drop-zone" class="glass-panel px-6 py-4 border-2 border-dashed border-slate-600 text-center cursor-pointer transition-colors w-full md:w-96">
        <p class="text-sm text-slate-300 font-medium">Drag & Drop JSON File Here</p>
        <p class="text-xs text-slate-500 mt-1">or click to browse</p>
        <input type="file" id="file-input" class="hidden" accept=".json" />
      </div>
    </header>

    <!-- Top Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="stats-container">
      <!-- Generated via JS -->
    </div>

    <!-- Charts Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Main Chart: BPM & IBI -->
      <div class="glass-panel p-4 lg:col-span-2 flex flex-col relative h-[400px]">
        <h2 class="text-lg font-semibold text-slate-200 mb-2">Heart Rate & Intervals (BPM)</h2>
        <div class="flex-1 relative w-full">
            <canvas id="bpmChart"></canvas>
        </div>
      </div>

      <!-- Secondary Chart: SQI -->
      <div class="glass-panel p-4 flex flex-col relative h-[400px]">
        <h2 class="text-lg font-semibold text-slate-200 mb-2">Signal Quality Index (SQI)</h2>
        <div class="flex-1 relative w-full">
            <canvas id="sqiChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Data Table / Event Log -->
    <div class="glass-panel overflow-hidden flex flex-col">
      <div class="p-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/50">
        <h2 class="text-lg font-semibold text-slate-200">Anomaly Event Log</h2>
        <span class="text-xs px-2 py-1 bg-slate-700 rounded text-slate-300" id="event-count">0 Events</span>
      </div>
      <div class="overflow-x-auto max-h-80">
        <table class="w-full text-sm text-left text-slate-300">
          <thead class="text-xs text-slate-400 uppercase bg-slate-800/80 sticky top-0">
            <tr>
              <th scope="col" class="px-6 py-3">Time (s)</th>
              <th scope="col" class="px-6 py-3">Type</th>
              <th scope="col" class="px-6 py-3">Details</th>
              <th scope="col" class="px-6 py-3">Magnitude / Metric</th>
            </tr>
          </thead>
          <tbody id="event-log-body" class="divide-y divide-slate-700/50">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

      ],
      "qualitySummary": {
        "totalBeats": 61,

        "dicroticRejectsCount": 9,

        "ibiChangeThreshold": 0.3,

        "sqiWarnThreshold": 0.003
      }
    };

    // --- Chart Global Defaults ---
    Chart.defaults.color = '#94a3b8'; // Slate 400
    Chart.defaults.font.family = "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif";

    // --- Core Logic ---
    function init() {
      setupDragDrop();
      loadData(demoData);
    }

    function setupDragDrop() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      dropZone.addEventListener('click', () => fileInput.click());
      
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });
      
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      });
    }

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const json = JSON.parse(e.target.result);
          loadData(json);
        } catch (err) {
          alert("Invalid JSON file.");
          console.error(err);
        }
      };
      reader.readAsText(file);
    }

    function loadData(data) {
      if (!data || !data.beatTimestamps) {
        alert("Invalid format: Missing beatTimestamps");
        return;
      }
      currentData = data;
      
      updateSummaryCards(data);
      updateEventLog(data);
      renderBpmChart(data);
      renderSqiChart(data);
    }

    // --- UI Updaters ---
    function updateSummaryCards(data) {
      const qs = data.qualitySummary;
      const container = document.getElementById('stats-container');
      
      const cards = [
        { label: "Total Beats", value: qs.totalBeats, icon: "💓", color: "text-blue-400" },
        { label: "Clean Beats", value: qs.cleanBeats, icon: "✅", color: "text-emerald-400" },
        { label: "Flagged Beats", value: qs.flaggedBeats, icon: "⚠️", color: "text-rose-400" },
        { label: "Flag Rate", value: `${qs.flagRate}%`, icon: "📈", color: "text-amber-400" },
        { label: "Dicrotic Rejects", value: qs.dicroticRejectsCount, icon: "🚫", color: "text-purple-400" },
      ];

      container.innerHTML = cards.map(c => `
        <div class="glass-panel p-4 flex flex-col justify-center items-start">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-lg">${c.icon}</span>
            <span class="text-xs text-slate-400 uppercase tracking-wider font-semibold">${c.label}</span>
          </div>
          <span class="text-2xl font-bold ${c.color}">${c.value}</span>
        </div>
      `).join('');
    }

    function updateEventLog(data) {
      const tbody = document.getElementById('event-log-body');
      let events = [];

      // Add IBIs flags
      if (data.ibiFlags) {
        data.ibiFlags.forEach(f => {
          if (f.flag !== null) {
            events.push({
              time: f.time,
              timeSec: (f.time / 1000).toFixed(2),
              type: 'IBI Flag',
              typeClass: 'bg-rose-500/20 text-rose-400 border border-rose-500/30',
              details: f.flag.type.replace('_', ' '),
              metric: `Diff: ${f.flag.magnitude.toFixed(1)}% (${f.flag.prevIbi}ms ➔ ${f.flag.currentIbi}ms)`
            });
          }
        });
      }

      // Add Dicrotic rejections
      if (data.dicroticRejections) {
        data.dicroticRejections.forEach(d => {
          events.push({
            time: d.time,
            timeSec: (d.time / 1000).toFixed(2),
            type: 'Dicrotic Reject',
            typeClass: 'bg-purple-500/20 text-purple-400 border border-purple-500/30',
            details: `Detected premature peak`,
            metric: `IBI: ${Math.round(d.rejectedIbi)}ms (Expected: ~${Math.round(d.expectedPeriod)}ms)`
          });
        });
      }

      // Sort by time
      events.sort((a, b) => a.time - b.time);
      document.getElementById('event-count').textContent = `${events.length} Events`;

      if (events.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-slate-500">No anomalies detected.</td></tr>`;
        return;
      }

      tbody.innerHTML = events.map(e => `
        <tr class="hover:bg-slate-800/40 transition-colors">
          <td class="px-6 py-3 font-mono text-slate-400">${e.timeSec}s</td>
          <td class="px-6 py-3">
            <span class="px-2 py-1 text-xs rounded-md ${e.typeClass}">${e.type}</span>
          </td>
          <td class="px-6 py-3 text-slate-300 capitalize">${e.details}</td>
          <td class="px-6 py-3 text-slate-400 text-xs">${e.metric}</td>
        </tr>
      `).join('');
    }

    // --- Chart Rendering ---
    function renderBpmChart(data) {
      const ctx = document.getElementById('bpmChart').getContext('2d');
      if (bpmChartInstance) bpmChartInstance.destroy();

      const startTime = data.beatTimestamps[0];
      const bpmPoints = [];
      const flagPoints = [];

      // Convert timestamps to BPM and build dataset
      for (let i = 1; i < data.beatTimestamps.length; i++) {
        const timeMs = data.beatTimestamps[i];
        const timeSec = (timeMs - startTime) / 1000; // Relative seconds
        const intervalMs = timeMs - data.beatTimestamps[i - 1];
        const bpm = 60000 / intervalMs;

        // Check if flagged
        const flagObj = data.ibiFlags ? data.ibiFlags.find(f => f.time === timeMs && f.flag !== null) : null;

        const point = { x: timeSec, y: bpm, timeOriginal: timeMs, flag: flagObj };
        bpmPoints.push(point);
        if (flagObj) flagPoints.push(point);
      }

      bpmChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [
            {
              label: 'Heart Rate (BPM)',
              data: bpmPoints,
              borderColor: '#3b82f6', // Blue 500
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              borderWidth: 2,
              pointBackgroundColor: (ctx) => {
                const point = ctx.raw;
                return point && point.flag ? '#f43f5e' : '#10b981'; // Rose for flag, Emerald for clean
              },
              pointBorderColor: '#0f172a',
              pointRadius: (ctx) => {
                 const point = ctx.raw;
                 return point && point.flag ? 6 : 3;
              },
              pointHoverRadius: 8,
              fill: true,
              tension: 0.2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleColor: '#f8fafc',
              bodyColor: '#cbd5e1',
              borderColor: '#334155',
              borderWidth: 1,
              callbacks: {
                label: (context) => {
                  const p = context.raw;
                  let label = `BPM: ${p.y.toFixed(1)} `;
                  if (p.flag) label += ` | ⚠️ Flag: ${p.flag.flag.type}`;
                  return label;
                }
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              title: { display: true, text: 'Time since start (seconds)', color: '#64748b' },
              grid: { color: '#1e293b' }
            },
            y: {
              title: { display: true, text: 'BPM', color: '#64748b' },
              grid: { color: '#1e293b' },
              suggestedMin: 40,
              suggestedMax: 160
            }
          }
        }
      });
    }

    function renderSqiChart(data) {
      const ctx = document.getElementById('sqiChart').getContext('2d');
      if (sqiChartInstance) sqiChartInstance.destroy();

      if (!data.sqiTimeSeries || data.sqiTimeSeries.length === 0) {
        // No SQI data handling could go here
        return;
      }

      const startTime = data.beatTimestamps[0]; // Align timescale with BPM chart
      const sqiPoints = data.sqiTimeSeries.map(s => ({
        x: (s.time - startTime) / 1000, 
        y: s.sqi
      })).filter(s => s.x >= -10); // Filter out way-too-early SQI if misaligned

      sqiChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [{
            label: 'Signal Quality Index',
            data: sqiPoints,
            borderColor: '#8b5cf6', // Violet 500
            backgroundColor: 'rgba(139, 92, 246, 0.1)',
            borderWidth: 2,
            pointRadius: 2,
            pointHoverRadius: 6,
            pointBackgroundColor: '#8b5cf6',
            fill: true,
            tension: 0.3,
            stepped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              callbacks: {
                label: (context) => `SQI: ${context.raw.y.toFixed(4)}`
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              title: { display: true, text: 'Time (seconds)', color: '#64748b' },
              grid: { color: '#1e293b' }
            },
            y: {
              title: { display: true, text: 'SQI Value', color: '#64748b' },
              grid: { color: '#1e293b' },
              beginAtZero: true
            }
          }
        }
      });
    }

    // Init on load
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
